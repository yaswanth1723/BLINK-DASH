<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simon Says Pro</title>
  <link rel="stylesheet" href="simon.css">
</head>
<body>

<div class="container">

  <h1>Simon Says</h1>

  <div class="top-bar">
    <button id="startBtn">Start</button>
    <button id="themeToggle">🌙</button>
    <button id="soundToggle">🔊</button>
  </div>

  <h2 id="status">Press Start</h2>

  <div class="score-board">
    <span>Level: <b id="level">0</b></span>
    <span>High Score: <b id="highScore">0</b></span>
  </div>

  <div class="game">
    <div class="btn red" data-color="red"></div>
    <div class="btn yellow" data-color="yellow"></div>
    <div class="btn blue" data-color="blue"></div>
    <div class="btn green" data-color="green"></div>
  </div>

</div>

<script src="simon.js"></script>
</body>
</html>
